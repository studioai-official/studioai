<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio AI - Portfolio Showcase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .board-header { margin-bottom: 40px; text-align: center; }
        .board-header h1 { font-size: 2.8rem; font-weight: 700; margin-bottom: 10px; color: #00e676; }
        .board-header p { color: #666666; font-size: 16px; }
        .feed-list { display: flex; flex-direction: column; gap: 35px; }
        .feed-item { background-color: #0a0a0c; border: 1px solid #1a1a1c; padding: 30px; border-radius: 20px; }
        .feed-meta { display: flex; justify-content: space-between; margin-bottom: 15px; color: #444444; font-size: 14px; }
        .feed-author { color: #ffffff; font-weight: 700; font-size: 16px; }
        .feed-content { color: #aaaaaa; font-size: 15px; white-space: pre-line; line-height: 1.6; margin-bottom: 20px; }
        .feed-image-wrapper { width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1c; margin-bottom: 15px; }
        .feed-image { width: 100%; height: auto; display: block; max-height: 600px; object-fit: contain; }
        .feed-video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 1px solid #1a1a1c; margin-bottom: 15px; }
        .feed-video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .delete-btn { background: none; border: none; color: #444444; cursor: pointer; font-size: 13px; margin-left: 15px; }
        .delete-btn:hover { color: #ff5252; }
        .no-data { text-align: center; color: #444444; padding: 60px 0; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Studio AI<span>.</span></a>
        <div class="nav-links">
            <a href="index.html" class="back-btn">◀ 메인으로</a>
            <span onclick="location.href='psychologyadmin.html'" class="admin-btn" onmouseover="this.style.color='#00e676'" onmouseout="this.style.color='#222222'">⋮</span>
        </div>
    </header>

    <div class="container">
        <div class="board-header">
            <h1>PORTFOLIO SHOWCASE</h1>
            <p>디자인 작업물, 카드뉴스 및 유튜브 영상을 아카이빙하는 보드입니다.</p>
        </div>

        <div class="write-box">
            <div class="input-row">
                <div class="form-group"><input type="text" id="author-input" placeholder="작성자명" maxlength="10"></div>
                <div class="form-group"><input type="password" id="password-input" placeholder="비밀번호" maxlength="12"></div>
            </div>
            <div class="form-group" style="margin-bottom: 15px;"><input type="text" id="image-url-input" placeholder="이미지 주소(URL)를 입력하세요 (선택)"></div>
            <div class="form-group" style="margin-bottom: 20px;"><input type="text" id="youtube-url-input" placeholder="유튜브 영상 주소(URL)를 입력하세요 (선택)"></div>
            <div class="form-group"><textarea id="content-input" placeholder="작품에 대한 설명이나 기획 의도를 기록해 주세요..." maxlength="300"></textarea></div>
            <div class="submit-row" style="text-align: right; margin-top: 20px;"><button class="submit-btn" onclick="addPortfolio()">UPLOAD WORK</button></div>
        </div>

        <div id="feed-container" class="feed-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq19TCAGIDWDRFg5uqfFafJ6aMFC1AM8g",
            authDomain: "wemento-board.firebaseapp.com",
            projectId: "wemento-board",
            storageBucket: "wemento-board.firebasestorage.app",
            messagingSenderId: "995727815375",
            appId: "1:995727815375:web:c07d2adc92cdb22bbf3dba"
        };
        const db = getFirestore(initializeApp(firebaseConfig));
        const collectionName = "posts_portfolio2"; 
        const feedContainer = document.getElementById('feed-container');

        function getYoutubeEmbedUrl(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : null;
        }

        function startListening() {
            onSnapshot(query(collection(db, collectionName), orderBy("timestamp", "asc")), (snapshot) => {
                feedContainer.innerHTML = '';
                if (snapshot.empty) { feedContainer.innerHTML = `<div class="no-data">등록된 포트폴리오가 없습니다.</div>`; return; }
                const docsArray = [];
                snapshot.forEach(doc => docsArray.push({ id: doc.id, ...doc.data() }));
                docsArray.reverse().forEach((post) => {
                    const item = document.createElement('div');
                    item.className = 'feed-item';
                    const videoHtml = getYoutubeEmbedUrl(post.youtubeUrl) ? `<div class="feed-video-wrapper"><iframe src="${getYoutubeEmbedUrl(post.youtubeUrl)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : '';
                    item.innerHTML = `
                        <div class="feed-meta">
                            <span class="feed-author">${escapeHtml(post.author)}</span>
                            <div><span>${post.date}</span><button class="delete-btn" data-id="${post.id}">삭제</button></div>
                        </div>
                        <div class="feed-content">${escapeHtml(post.content)}</div>
                        ${videoHtml}
                        ${post.imageUrl ? `<div class="feed-image-wrapper"><img src="${escapeHtml(post.imageUrl)}" class="feed-image" alt="work"></div>` : ''}
                    `;
                    feedContainer.appendChild(item);
                });
                document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', (e) => deletePost(e.target.getAttribute('data-id'))));
            });
        }

        window.addPortfolio = async function() {
            const author = document.getElementById('author-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            const content = document.getElementById('content-input').value.trim();
            const imageUrl = document.getElementById('image-url-input').value.trim();
            const youtubeUrl = document.getElementById('youtube-url-input').value.trim();
            if (!author || !password || !content) { alert('작성자, 비밀번호, 내용을 입력해 주세요.'); return; }
            if (!imageUrl && !youtubeUrl) { alert('이미지 또는 유튜브 주소 중 하나는 필수입니다.'); return; }
            const now = new Date();
            await addDoc(collection(db, collectionName), {
                author, password, content, imageUrl, youtubeUrl,
                date: `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`,
                timestamp: Date.now()
            });
            alert('업로드 완료!');
            document.getElementById('content-input').value = '';
        }

        async function deletePost(id) {
            const inputPassword = prompt('삭제 비밀번호를 입력하세요:');
            if (!inputPassword) return;
            const docSnap = await getDoc(doc(db, collectionName, id));
            const adminSnap = await getDoc(doc(db, "system_config", "admin_credential"));
            if (inputPassword === docSnap.data().password || (adminSnap.exists() && inputPassword === adminSnap.data().masterPassword)) {
                await deleteDoc(doc(db, collectionName, id)); alert('삭제 완료.');
            } else { alert('비밀번호 불일치'); }
        }

        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }
        startListening();
    </script>
</body>
</html>
