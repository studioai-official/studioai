<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio AI - 스터디 신청서</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; background-color: #000000; color: #ffffff; line-height: 1.7; overflow-x: hidden; word-break: keep-all; }

        .custom-cursor { width: 20px; height: 20px; border: 2px solid #00e676; border-radius: 50%; position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999; transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.6s ease, border-color 0.6s ease; }
        .custom-cursor.hovered { transform: translate(-50%, -50%) scale(2.8); background-color: rgba(0, 230, 118, 0.1); border-color: #00e676; }

        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 25px 50px; background-color: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: #ffffff; text-decoration: none; }
        .logo span { color: #00e676; }
        .back-btn { color: #aaaaaa; text-decoration: none; font-size: 15px; font-weight: 500; transition: color 0.3s; }
        .back-btn:hover { color: #00e676; }
        
        .apply-container { max-width: 760px; margin: 140px auto 80px auto; padding: 0 20px; }
        .form-card { background-color: #0a0a0c; border: 1px solid #1a1a1c; padding: 50px 40px; border-radius: 20px; }
        .form-header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid #1a1a1c; padding-bottom: 30px; }
        .form-header h1 { font-size: 28px; font-weight: 700; color: #ffffff; margin-bottom: 15px; }
        .form-header p { color: #999999; font-size: 15px; line-height: 1.6; }
        .form-section-title { font-size: 16px; font-weight: 700; color: #ffffff; margin: 35px 0 15px 0; padding-bottom: 8px; border-bottom: 1px solid #222224; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #00e676; }
        .form-group label span { color: #ff4d4d; margin-left: 4px; }
        .form-control { width: 100%; background-color: #121214; border: 1px solid #222225; border-radius: 8px; padding: 14px 18px; color: #ffffff; font-size: 15px; outline: none; transition: all 0.3s; }
        .form-control:focus { border-color: #00e676; box-shadow: 0 0 8px rgba(0, 230, 118, 0.2); }
        .option-group { display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
        .option-label { display: flex; align-items: center; gap: 12px; color: #cccccc; font-size: 15px; }
        .option-label input { accent-color: #00e676; width: 18px; height: 18px; }
        .submit-btn { width: 100%; padding: 16px; background-color: #00e676; color: #000000; border: none; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.4s; }
        .submit-btn:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0, 230, 118, 0.3); }

        @media screen and (max-width: 768px) {
            .custom-cursor { display: none !important; }
            header { padding: 15px 20px; }
            .apply-container { margin-top: 100px; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor" id="cursor"></div>

    <header>
        <a href="index.html" class="logo hover-target">Studio AI<span>.</span></a>
        <a href="index.html" class="back-btn hover-target">← 메인으로 돌아가기</a>
    </header>

    <div class="apply-container">
        <div class="form-card">
            <div class="form-header">
                <h1>🚀 AI 웹사이트 제작 스터디 신청서</h1>
                <p>안녕하세요 🙂<br>함께 AI와 함께 나만의 웹 사이트를 만들고 성장하는 모임에 관심 가져주셔서 감사합니다!</p>
            </div>

            <form id="studyForm">
                <div class="form-section-title">📌 기본 정보</div>
                <div class="form-group"><label for="userName">이름<span>*</span></label><input type="text" id="userName" class="form-control hover-target" placeholder="예: 홍길동" required></div>
                <div class="form-group"><label for="userContact">연락처<span>*</span></label><input type="tel" id="userContact" class="form-control hover-target" placeholder="예: 010-1234-5678" required></div>
                <div class="form-group"><label for="userAge">나이</label><input type="number" id="userAge" class="form-control hover-target" placeholder="예: 25"></div>
                <div class="form-group"><label for="userJob">전공(직업)</label><input type="text" id="userJob" class="form-control hover-target" placeholder="예: 컴퓨터공학 / 직장인"></div>
                <div class="form-group"><label for="userAddress">거주지</label><input type="text" id="userAddress" class="form-control hover-target" placeholder="예: 부평동, 십정동"></div>

                <div class="form-section-title">📌 상세 내용</div>
                <div class="form-group"><label for="availableTime">참여 가능 시간<span>*</span></label><input type="text" id="availableTime" class="form-control hover-target" placeholder="예: 평일 저녁 7시 이후, 주말 오전" required></div>
                <div class="form-group"><label for="userInterests">관심 분야</label><input type="text" id="userInterests" class="form-control hover-target" placeholder="예: AI 챗봇 만들기, 웹 서비스 배포"></div>
                <div class="form-group"><label for="userIntro">자기소개</label><textarea id="userIntro" class="form-control hover-target" rows="3" placeholder="예: 간단한 자기소개와 개발에 관심을 가지게 된 계기를 적어주세요."></textarea></div>
                <div class="form-group"><label for="userPurpose">지원 동기(목적)</label><textarea id="userPurpose" class="form-control hover-target" rows="3" placeholder="예: 이번 스터디를 통해 나만의 웹 사이트를 꼭 완성해보고 싶습니다!"></textarea></div>

                <div class="form-section-title">📌 경험 수준<span>*</span></div>
                <div class="option-group">
                    <label class="option-label hover-target"><input type="radio" name="expLevel" value="완전 초보" required> 완전 초보</label>
                    <label class="option-label hover-target"><input type="radio" name="expLevel" value="노코드 사용 경험 있음"> 노코드 사용 경험 있음</label>
                    <label class="option-label hover-target"><input type="radio" name="expLevel" value="웹개발 경험 있음"> 웹개발 경험 있음</label>
                </div>

                <button type="submit" class="submit-btn hover-target" style="margin-top: 40px;">스터디 신청서 제출하기 ⚡</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq19TCAGIDWDRFg5uqfFafJ6aMFC1AM8g",
            authDomain: "wemento-board.firebaseapp.com",
            projectId: "wemento-board",
            storageBucket: "wemento-board.firebasestorage.app",
            messagingSenderId: "995727815375",
            appId: "1:995727815375:web:c07d2adc92cdb22bbf3dba"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // 커서 이벤트
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        document.addEventListener('mouseover', (e) => { if (e.target.classList.contains('hover-target')) cursor.classList.add('hovered'); });
        document.addEventListener('mouseout', (e) => { if (e.target.classList.contains('hover-target')) cursor.classList.remove('hovered'); });

        document.getElementById('studyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "제출 중...";
            btn.disabled = true;

            try {
                const data = {
                    author: document.getElementById('userName').value,
                    contact: document.getElementById('userContact').value,
                    age: document.getElementById('userAge').value,
                    job: document.getElementById('userJob').value,
                    address: document.getElementById('userAddress').value,
                    availableTime: document.getElementById('availableTime').value,
                    interests: document.getElementById('userInterests').value,
                    intro: document.getElementById('userIntro').value,
                    purpose: document.getElementById('userPurpose').value,
                    expLevel: document.querySelector('input[name="expLevel"]:checked').value,
                    date: new Date().toLocaleString(),
                    timestamp: Date.now()
                };

                await addDoc(collection(db, "applications"), data);

                const container = document.querySelector('.form-card');
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 0;">
                        <div style="font-size: 50px; margin-bottom: 20px;">✨</div>
                        <h2 style="color: #ffffff; margin-bottom: 10px;">신청이 완료되었습니다!</h2>
                        <p style="color: #999; margin-bottom: 30px;">검토 후 빠르게 연락드리겠습니다.</p>
                        <button onclick="location.href='index.html'" class="submit-btn hover-target" style="width: auto; padding: 12px 30px;">메인으로 돌아가기</button>
                    </div>
                `;
            } catch (error) {
                console.error("저장 실패:", error);
                alert("잠시 오류가 발생했습니다. 다시 시도해주세요.");
                btn.innerText = "스터디 신청서 제출하기 ⚡";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
