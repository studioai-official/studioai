<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio AI - 스터디 신청서</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.7;
            overflow-x: hidden;
            word-break: keep-all; /* 한글 단어 끊김 방지 */
        }

        /* -------------------------------------------------- */
        /* 커스텀 마우스 포인터 스타일 (메인 페이지와 동일) */
        /* -------------------------------------------------- */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #00e676;
            border-radius: 50%;
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.6s ease, border-color 0.6s ease;
        }
        .custom-cursor.hovered {
            transform: translate(-50%, -50%) scale(2.8);
            background-color: rgba(0, 230, 118, 0.1);
            border-color: #00e676;
        }

        /* 상단 네비게이션 바 (뒤로가기/홈 이동 중심) */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 50px;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: #ffffff; text-decoration: none; }
        .logo span { color: #00e676; }
        
        .back-btn {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .back-btn:hover { color: #00e676; }

        /* -------------------------------------------------- */
        /* 신청서 폼 레이아웃 */
        /* -------------------------------------------------- */
        .apply-container {
            max-width: 760px;
            margin: 140px auto 80px auto;
            padding: 0 20px;
        }

        .form-card {
            background-color: #0a0a0c;
            border: 1px solid #1a1a1c;
            padding: 50px 40px;
            border-radius: 20px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #1a1a1c;
            padding-bottom: 30px;
        }
        .form-header h1 { font-size: 28px; font-weight: 700; color: #ffffff; margin-bottom: 15px; }
        .form-header p { color: #999999; font-size: 15px; line-height: 1.6; }

        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin: 35px 0 15px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #222224;
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #00e676;
        }
        .form-group label span {
            color: #ff4d4d;
            margin-left: 4px;
        }

        /* 입력창 디자인 */
        .form-control {
            width: 100%;
            background-color: #121214;
            border: 1px solid #2a2a2c;
            border-radius: 8px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .form-control:focus {
            border-color: #00e676;
            box-shadow: 0 0 8px rgba(0, 230, 118, 0.2);
        }

        /* 라디오 & 체크박스 그룹 */
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 5px;
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cccccc;
            font-size: 15px;
            font-weight: 400;
        }
        .option-label input[type="radio"], .option-label input[type="checkbox"] {
            accent-color: #00e676;
            width: 18px;
            height: 18px;
        }

        /* 안내 문구 및 제출 버튼 */
        .form-footer-notice {
            font-size: 13px;
            color: #666666;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background-color: #00e676;
            color: #000000;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            transition: transform 0.4s, background-color 0.4s, box-shadow 0.4s;
        }
        .submit-btn:hover {
            transform: translateY(-4px);
            background-color: #00c864;
            box-shadow: 0 8px 20px rgba(0, 230, 118, 0.3);
        }

        /* 📱 모바일 반응형 최적화 */
        @media screen and (max-width: 768px) {
            .custom-cursor { display: none !important; }
            body { cursor: default !important; }
            .logo, .back-btn, .form-control, .option-label, .submit-btn { cursor: default !important; }

            header { padding: 15px 20px; }
            .logo { font-size: 20px; }
            
            .apply-container { margin-top: 100px; margin-bottom: 40px; }
            .form-card { padding: 30px 20px; border-radius: 15px; }
            .form-header h1 { font-size: 22px; }
            .form-header p { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <header>
        <header>
        <a href="index.html" class="logo hover-target">Studio AI<span>.</span></a>
        <div style="display: flex; align-items: center;">
            <a href="index.html" class="back-btn hover-target">← 메인으로 돌아가기</a>
            <span onclick="location.href='psychologyadmin.html'" 
                  style="color: #222222; margin-left: 20px; padding: 5px 10px; cursor: pointer; font-size: 18px; user-select: none; transition: color 0.3s;" 
                  class="hover-target" 
                  onmouseover="this.style.color='#00e676'" 
                  onmouseout="this.style.color='#222222'">⋮</span>
        </div>
        </header>
    </header>

    <div class="apply-container">
        <div class="form-card">
            
            <div class="form-header">
                <h1>🚀 AI 웹사이트 제작 스터디 신청서</h1>
                <p>안녕하세요 🙂<br>함께 AI와 함께 나만의 웹 사이트를 만들고 성장하는 모임에 관심 가져주셔서 감사합니다!</p>
            </div>

            <form id="studyForm">
                
                <div class="form-section-title">📌 기본 정보</div>
                
                <div class="form-group">
                    <label for="userName">이름<span>*</span></label>
                    <input type="text" id="userName" class="form-control hover-target" placeholder="이름을 입력해주세요" required>
                </div>

                <div class="form-group">
                    <label for="userContact">연락처<span>*</span></label>
                    <input type="tel" id="userContact" class="form-control hover-target" placeholder="예: 010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label for="userAge">나이</label>
                    <input type="number" id="userAge" class="form-control hover-target" placeholder="나이를 입력해주세요">
                </div>

                <div class="form-group">
                    <label for="userJob">전공(직업)</label>
                    <input type="text" id="userJob" class="form-control hover-target" placeholder="현재 직업이나 전공을 입력해주세요">
                </div>


                <div class="form-section-title">📌 참여 가능 시간</div>
                
                <div class="form-group">
                    <label for="availableTime">가능한 요일/시간대를 자유롭게 적어주세요<span>*</span></label>
                    <textarea id="availableTime" class="form-control hover-target" rows="3" placeholder="예:&#10;- 평일 저녁 7시 이후&#10;- 주말 오후 가능" required></textarea>
                </div>


                <div class="form-section-title">📌 경험 수준</div>
                
                <div class="form-group">
                    <label>현재 AI 또는 웹개발 경험이 어느 정도 있으신가요?<span>*</span></label>
                    <div class="option-group">
                        <label class="option-label hover-target"><input type="radio" name="expLevel" value="완전 초보" required> 1) 완전 초보</label>
                        <label class="option-label hover-target"><input type="radio" name="expLevel" value="노코드 사용 경험 있음"> 2) 노코드 사용 경험 있음</label>
                        <label class="option-label hover-target"><input type="radio" name="expLevel" value="웹개발 경험 있음"> 3) 웹개발 경험 있음</label>
                        <label class="option-label hover-target"><input type="radio" name="expLevel" value="AI 서비스 개발 경험 있음"> 4) AI 서비스 개발 경험 있음</label>
                    </div>
                </div>


                <div class="form-section-title">📌 관심 분야</div>
                
                <div class="form-group">
                    <label>관심 있는 분야를 선택해주세요 (중복 선택 가능)<span>*</span></label>
                    <div class="option-group">
                        <label class="option-label hover-target"><input type="checkbox" name="interest" value="ChatGPT 활용"> 1) ChatGPT 활용</label>
                        <label class="option-label hover-target"><input type="checkbox" name="interest" value="AI 챗봇 제작"> 2) AI 챗봇 제작</label>
                        <label class="option-label hover-target"><input type="checkbox" name="interest" value="웹사이트 제작"> 3) 웹사이트 제작</label>
                        <label class="option-label hover-target"><input type="checkbox" name="interest" value="기타"> 4) 기타</label>
                    </div>
                </div>


                <div class="form-section-title">📌 참여 목적</div>
                
                <div class="form-group">
                    <label for="joinPurpose">왜 스터디에 참여하고 싶으신가요?<span>*</span></label>
                    <textarea id="joinPurpose" class="form-control hover-target" rows="3" placeholder="예:&#10;- AI 웹서비스를 직접 만들어보고 싶어서&#10;- 창업 아이템을 구현하고 싶어서&#10;- 개발 역량을 키우고 싶어서" required></textarea>
                </div>


                <div class="form-section-title">📌 자기소개</div>
                
                <div class="form-group">
                    <label for="selfIntro">간단한 자기소개를 작성해주세요 🙂<span>*</span></label>
                    <textarea id="selfIntro" class="form-control hover-target" rows="4" placeholder="작성해주신 내용은 스터디 운영 및 멤버 매칭에 참고됩니다." required></textarea>
                </div>


                <div class="form-footer-notice">
                    작성해주신 내용은 스터디 운영 및 멤버 매칭에 참고됩니다.<br>확인 후 개별 안내드리겠습니다.
                </div>

                <button type="submit" class="submit-btn hover-target">스터디 신청서 제출하기 ⚡</button>
            </form>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 파이어베이스 식별 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyCq19TCAGIDWDRFg5uqfFafJ6aMFC1AM8g",
            authDomain: "wemento-board.firebaseapp.com",
            projectId: "wemento-board",
            storageBucket: "wemento-board.firebasestorage.app",
            messagingSenderId: "995727815375",
            appId: "1:995727815375:web:c07d2adc92cdb22bbf3dba"
        };

        // 앱 및 데이터베이스 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 마우스 커서 이펙트 제어
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.addEventListener('mouseover', (e) => {
            if (e.target.classList.contains('hover-target') || e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                cursor.classList.add('hovered');
            }
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.classList.contains('hover-target') || e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                cursor.classList.remove('hovered');
            }
        });

        // 폼 제출 이벤트 리스너 연동 (데이터 개별 필드 분리 저장)
        document.getElementById('studyForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            // 관심분야 체크박스 검증 및 배열화
            const interests = [];
            document.querySelectorAll('input[name="interest"]:checked').forEach((chk) => {
                interests.push(chk.value);
            });

            if (interests.length === 0) {
                alert("📌 관심 분야를 최소 하나 이상 선택해 주세요!");
                return;
            }

            // 각 입력폼 데이터 개별 수집
            const userName = document.getElementById('userName').value;
            const userContact = document.getElementById('userContact').value;
            const userAge = document.getElementById('userAge').value ? Number(document.getElementById('userAge').value) : "미기재";
            const userJob = document.getElementById('userJob').value || "미기재";
            const availableTime = document.getElementById('availableTime').value;
            const expLevel = document.querySelector('input[name="expLevel"]:checked').value;
            const interestString = interests.join(', ');
            const joinPurpose = document.getElementById('joinPurpose').value;
            const selfIntro = document.getElementById('selfIntro').value;

            // 현재 시간 포맷팅 (예: 2026.06.01 16:16)
            const now = new Date();
            const dateString = now.getFullYear() + '.' + 
                               String(now.getMonth() + 1).padStart(2, '0') + '.' + 
                               String(now.getDate()).padStart(2, '0') + ' ' + 
                               String(now.getHours()).padStart(2, '0') + ':' + 
                               String(now.getMinutes()).padStart(2, '0');

            try {
                // 파이어베이스 Firestore에 데이터를 각각의 필드로 분리하여 저장
                await addDoc(collection(db, "posts"), {
                    author: userName,            // 작성자 이름
                    contact: userContact,        // 연락처
                    age: userAge,                // 나이
                    job: userJob,                // 직업 및 전공
                    availableTime: availableTime, // 가능한 시간
                    expLevel: expLevel,          // 경험 수준
                    interests: interestString,   // 관심 분야
                    purpose: joinPurpose,        // 참여 목적
                    intro: selfIntro,            // 자기소개
                    date: dateString,            // 포맷팅된 날짜 문자열
                    timestamp: Date.now()        // 정렬용 타임스탬프
                });

                alert(`🎉 ${userName}님, 모임 신청이 완료되었습니다!`);
                
                // 제출 완료 후 메인 페이지로 이동
                window.location.href = "index.html";

            } catch (error) {
                console.error("파이어베이스 저장 에러:", error);
                alert("신청 처리 중 문제가 발생했습니다. 브라우저 콘솔창의 에러 메시지를 확인해주세요.");
            }
        });
    </script>
</body>
</html>
