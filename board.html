<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio AI - Community</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .board-header { text-align: center; margin-bottom: 40px; }
        .board-header h1 { font-size: 2.5rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
        
        .board-tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #1a1a1c; }
        .left-tabs { display: flex; gap: 10px; flex-grow: 1; }
        .tab-btn { background: #0a0a0c; border: 1px solid #222225; color: #888; padding: 12px 20px; border-radius: 30px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: #00e676; border-color: #00e676; color: #000; }
        .test-btn { background: #00e676; color: #000; border: none; font-weight: 700; }

        .write-box { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        textarea { height: 120px; resize: none; width: 100%; box-sizing: border-box; }

        .feed-item { background: #0a0a0c; border: 1px solid #1a1a1c; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        .feed-meta { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #666; margin-bottom: 10px; }
        .meta-right { display: flex; align-items: center; gap: 10px; }
        .feed-content { color: #ddd; white-space: pre-line; line-height: 1.6; }
        
        .delete-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 12px; }
        .delete-btn:hover { color: #ff5252; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Studio AI<span>.</span></a>
        <a href="index.html" style="color:#aaa; text-decoration:none;">메인으로</a>
    </header>

    <div class="container">
        <div class="board-header">
            <h1>COMMUNITY</h1>
            <p style="color:#666;">자유로운 생각과 영감을 공유하세요.</p>
        </div>

        <div class="board-tabs">
            <div class="left-tabs">
                <button class="tab-btn active" onclick="switchBoard('posts_free', this)">자유게시판</button>
                <button class="tab-btn" onclick="switchBoard('posts_qna', this)">Q&A</button>
                <button class="tab-btn" onclick="switchBoard('posts_notice', this)">공지사항</button>
            </div>
            <a href="enneagram.html" class="tab-btn test-btn">내 유형 알아보기✨</a>
        </div>

        <div class="write-box">
            <div class="input-row">
                <input type="text" id="author-input" placeholder="닉네임" maxlength="10">
                <input type="password" id="password-input" placeholder="비밀번호(4자)" maxlength="12">
            </div>
            <textarea id="content-input" placeholder="내용을 남겨주세요..." maxlength="300"></textarea>
            <button class="submit-btn" onclick="addPost()">POSTING</button>
        </div>

        <div id="feed-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq19TCAGIDWDRFg5uqfFafJ6aMFC1AM8g",
            authDomain: "wemento-board.firebaseapp.com",
            projectId: "wemento-board",
            storageBucket: "wemento-board.firebasestorage.app",
            messagingSenderId: "995727815375",
            appId: "1:995727815375:web:c07d2adc92cdb22bbf3dba"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let currentCollectionName = "posts_free";
        let unsubscribe = null;

        async function getMasterPassword() {
            const docSnap = await getDoc(doc(db, "system_config", "admin_credential"));
            return docSnap.exists() ? docSnap.data().masterPassword : null;
        }

        window.switchBoard = (name, btn) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCollectionName = name;
            startListening();
        }

        function startListening() {
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(query(collection(db, currentCollectionName)), (snapshot) => {
                const container = document.getElementById('feed-container');
                container.innerHTML = '';
                snapshot.forEach(docSnap => {
                    const p = docSnap.data();
                    const item = document.createElement('div');
                    item.className = 'feed-item';
                    item.innerHTML = `
                        <div class="feed-meta">
                            <span><b>${p.author || '익명'}</b></span>
                            <div class="meta-right">
                                <span>${p.date || ''}</span>
                                <button class="delete-btn" onclick="deletePost('${docSnap.id}')">삭제</button>
                            </div>
                        </div>
                        <div class="feed-content">${p.content || ''}</div>
                    `;
                    container.appendChild(item);
                });
            });
        }

        window.addPost = async () => {
            const author = document.getElementById('author-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            const content = document.getElementById('content-input').value.trim();
            if(!author || !password || !content) return alert('모든 내용을 입력하세요.');

            const now = new Date();
            await addDoc(collection(db, currentCollectionName), {
                author, password, content,
                date: `${now.getMonth()+1}.${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`
            });
            document.getElementById('content-input').value = '';
            document.getElementById('password-input').value = '';
        }

        window.deletePost = async (id) => {
            const inputPw = prompt("비밀번호를 입력하세요:");
            if (!inputPw) return;
            
            const masterPw = await getMasterPassword();
            const docRef = doc(db, currentCollectionName, id);
            const docSnap = await getDoc(docRef);
            
            if (docSnap.exists()) {
                // 작성자 비밀번호 일치 OR 관리자 마스터 비밀번호 일치 시 삭제
                if (docSnap.data().password === inputPw || inputPw === masterPw) {
                    await deleteDoc(docRef);
                    alert("삭제되었습니다.");
                } else {
                    alert("비밀번호가 틀렸습니다.");
                }
            }
        }
        
        startListening();
    </script>
</body>
</html>
